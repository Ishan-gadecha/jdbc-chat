<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advanced JDBC Chat</title>
    <style>
        :root {
            color: #e1e8f0;
            font-family: "Sora", "Inter", system-ui, sans-serif;
            background-color: #010409;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(7, 58, 93, 0.65), transparent 40%), #020409;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 1rem;
        }

        .app-shell {
            width: min(1300px, 100%);
            min-height: 90vh;
            border-radius: 28px;
            overflow: hidden;
            background: #0b121b;
            box-shadow: 0 40px 120px rgba(2, 6, 23, 0.8);
            display: grid;
            grid-template-columns: 360px 1fr;
        }

        .sidebar {
            background: linear-gradient(180deg, rgba(6, 20, 35, 0.95), rgba(3, 8, 20, 0.8));
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .brand-title {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #26deff;
        }

        .brand-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(120deg, #00ff94, #00a3ff);
        }

        .login-card {
            padding: 1.2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
        }

        .login-card h2 {
            margin: 0 0 0.35rem;
            font-size: 1.15rem;
        }

        .login-card form {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.6);
        }

        input, textarea, button {
            font: inherit;
        }

        .input-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: inherit;
        }

        .input-group input:focus {
            outline: 2px solid #26deff;
            outline-offset: 2px;
        }

        .login-card button {
            margin-top: 0.4rem;
            border: none;
            border-radius: 999px;
            padding: 0.7rem 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            background: linear-gradient(135deg, #00ff94, #00a3ff);
            color: #04111d;
            transition: transform 120ms ease;
        }

        .login-card button:active {
            transform: scale(0.97);
        }

        .status-line {
            margin: 0.35rem 0 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .panel {
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .panel-title {
            margin: 0 0 0.6rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
        }

        .contact-list,
        .message-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
            max-height: 220px;
            overflow: auto;
        }

        .contact {
            padding: 0.75rem 0.9rem;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .contact-handle {
            font-weight: 600;
            color: #d1ffde;
        }

        .contact-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .contact small {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .chat-shell {
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(1, 120, 99, 0.25), transparent 60%), #050b12;
            padding: 1.5rem;
            gap: 1rem;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .chat-title {
            margin: 0;
            font-size: 1.5rem;
        }

        .chat-subtitle {
            margin: 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .ghost {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            color: inherit;
            cursor: pointer;
        }

        .ghost:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .message-feed {
            flex: 1;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 70%;
            padding: 0.65rem 0.85rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .message--mine {
            align-self: flex-end;
            background: linear-gradient(135deg, #00ff94, #0099ff);
            color: #050b12;
            border: none;
            box-shadow: 0 15px 35px rgba(0, 153, 255, 0.2);
        }

        .message-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 0.25rem;
        }

        .message-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 999px;
            padding: 0.35rem 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: inherit;
            padding: 0.55rem 0.25rem;
        }

        .message-box button {
            border: none;
            border-radius: 999px;
            padding: 0.65rem 1rem;
            background: #26deff;
            color: #04111d;
            font-weight: 600;
            cursor: pointer;
        }

        .attachment-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-top: 0.5rem;
        }

        .attachment-row input[type="file"] {
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 0.45rem;
            background: rgba(255, 255, 255, 0.03);
        }

        .media-preview {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.75);
        }

        .message-media {
            margin-top: 0.5rem;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .message-media img,
        .message-media video {
            display: block;
            max-width: min(360px, 100%);
            border-radius: 12px;
        }

        .message-feedback {
            min-height: 1.1rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .message-feed::-webkit-scrollbar,
        .contact-list::-webkit-scrollbar,
        .message-list::-webkit-scrollbar {
            width: 8px;
        }

        .message-feed::-webkit-scrollbar-thumb,
        .contact-list::-webkit-scrollbar-thumb,
        .message-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }

        .hamburger-btn {
            display: none;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            margin-right: 0.8rem;
        }
        .call-btn {
            background: linear-gradient(135deg, #00ff94, #00a3ff);
            color: #04111d;
            border: none;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 120ms ease;
        }
        .call-btn:active {
            transform: scale(0.95);
        }
        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-backdrop.open {
            display: block;
            opacity: 1;
        }
        #callOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #010409;
            z-index: 200;
            flex-direction: column;
        }
        #callOverlay.active {
            display: flex;
        }
        .call-header {
            padding: 1rem;
            background: #0b121b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .call-header button {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        #jitsiContainer {
            flex: 1;
            width: 100%;
        }

        @media (max-width: 960px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -100%;
                bottom: 0;
                width: 320px;
                max-width: 85vw;
                z-index: 100;
                transition: left 0.3s ease;
                overflow-y: auto;
            }

            .sidebar.open {
                left: 0;
            }

            .chat-shell {
                order: 1;
            }

            .hamburger-btn {
                display: block;
            }

            .message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand-bar">
            <div>
                <p class="brand-title">ShipLink</p>
                <p class="status-line">Secure chat</p>
            </div>
            <div class="brand-dot"></div>
        </div>
        <div class="panel">
            <div class="panel-title">Your Account</div>
            <div style="padding: 0.75rem; border-radius: 12px; background: rgba(0, 255, 148, 0.1); border: 1px solid rgba(0, 255, 148, 0.2); margin-bottom: 0.6rem;">
                <p style="margin: 0; font-weight: 600; color: #d1ffde;" id="userDisplay"></p>
            </div>
            <button id="logoutButton" style="width: 100%; padding: 0.6rem; border-radius: 12px; background: linear-gradient(135deg, #ff6b6b, #ff8787); border: none; color: #fff; font-weight: 600; cursor: pointer;">Logout</button>
        </div>
        <div class="panel">
            <div class="panel-title">Recent Contacts</div>
            <ul id="contactList" class="contact-list"></ul>
        </div>
        <div class="panel">
            <div class="panel-title">Search Users</div>
            <form id="searchForm">
                <input id="searchInput" type="search" placeholder="Search someone" autocomplete="off" />
                <button type="submit">Search</button>
            </form>
            <ul id="searchList" class="message-list compact"></ul>
            <p class="status-line" id="searchStatus"></p>
        </div>
        <div class="panel">
            <div class="panel-title">Your Posts</div>
            <ul id="ownList" class="message-list compact"></ul>
            <p class="status-line" id="ownStatus">Loading your posts…</p>
        </div>
    </aside>
    <section class="chat-shell">
        <header class="chat-header">
            <div style="display: flex; align-items: center;">
                <button class="hamburger-btn" id="hamburgerBtn">☰</button>
                <div>
                    <p class="chat-title" id="chatTitle">ShipLink Chat</p>
                    <p class="chat-subtitle" id="chatStatus">Connected</p>
                </div>
            </div>
            <button class="call-btn" id="startCallBtn" style="display: none;">📞 Call</button>
        </header>
        <div class="message-feed" id="recentList"></div>
        <p class="status-line" id="recentStatus">Recent messages will appear here.</p>
        <form class="message-box" id="sendForm">
            <input id="messageInput" type="text" placeholder="Write a message" autocomplete="off" required />
            <button type="submit">Send</button>
        </form>
        <div class="attachment-row">
            <input id="mediaInput" type="file" accept="image/*,video/*" />
            <button id="clearMediaButton" type="button" class="ghost">Clear media</button>
        </div>
        <p class="media-preview" id="mediaStatus">No attachment selected.</p>
        <p class="message-feedback" id="sendFeedback"></p>
    </section>
</div>

<div id="callOverlay">
    <div class="call-header">
        <h3 style="margin:0;">Active Call</h3>
        <button id="endCallBtn">End Call</button>
    </div>
    <div id="jitsiContainer"></div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
    function clearAuthStorage() {
        sessionStorage.removeItem('handle');
        sessionStorage.removeItem('password');
        sessionStorage.removeItem('isAdmin');
        sessionStorage.removeItem('adminToken');
        localStorage.removeItem('handle');
        localStorage.removeItem('password');
        localStorage.removeItem('isAdmin');
        localStorage.removeItem('adminToken');
    }

    const navigationEntry = performance.getEntriesByType('navigation')[0];
    if (navigationEntry && navigationEntry.type === 'reload') {
        clearAuthStorage();
        window.location.href = 'login.html';
    }

    // Check if user is logged in
    const handle = sessionStorage.getItem('handle');
    const password = sessionStorage.getItem('password');

    if (!handle || !password) {
        window.location.href = 'login.html';
    }

    const API = {
        login: 'api/login',
        recent: 'api/messages/recent',
        search: 'api/messages/search',
        mine: 'api/messages/my',
        send: 'api/messages/send',
        delete: 'api/messages/delete',
        contacts: 'api/contacts',
        contactsAdd: 'api/contacts/add',
        userSearch: 'api/users/search'
    };

    const userDisplay = document.getElementById('userDisplay');
    const logoutButton = document.getElementById('logoutButton');
    const chatTitle = document.getElementById('chatTitle');
    const chatStatus = document.getElementById('chatStatus');
    const sendForm = document.getElementById('sendForm');
    const sendButton = sendForm.querySelector('button');
    const messageInput = document.getElementById('messageInput');
    const sendFeedback = document.getElementById('sendFeedback');
    const recentList = document.getElementById('recentList');
    const recentStatus = document.getElementById('recentStatus');
    const contactList = document.getElementById('contactList');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const searchList = document.getElementById('searchList');
    const searchStatus = document.getElementById('searchStatus');
    const ownList = document.getElementById('ownList');
    const ownStatus = document.getElementById('ownStatus');
    const mediaInput = document.getElementById('mediaInput');
    const clearMediaButton = document.getElementById('clearMediaButton');
    const mediaStatus = document.getElementById('mediaStatus');
    let selectedContact = '';
    let pendingMediaData = null;
    let pendingMediaMime = null;
    let conversationRefreshInFlight = false;
    let conversationGeneration = 0;
    const MAX_MEDIA_SIZE = 8 * 1024 * 1024;

    // Initialize UI
    userDisplay.textContent = '👤 ' + handle;
    chatTitle.textContent = 'Chat as ' + handle;
    messageInput.disabled = false;
    sendButton.disabled = false;
    chatStatus.textContent = 'Select a contact to start chatting.';

    // Logout handler
    logoutButton.addEventListener('click', () => {
        clearAuthStorage();
        window.location.href = 'login.html';
    });

    // Send message handler
    sendForm.addEventListener('submit', async event => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text) {
            sendFeedback.textContent = 'Type something before sending.';
            return;
        }
        sendFeedback.textContent = 'Sending…';
        try {
            const latestConversation = await sendMessage(text);
            messageInput.value = '';
            sendFeedback.textContent = 'Message delivered.';
            renderMessages(recentList, latestConversation);
            refreshOwnPosts();
            refreshContacts();
        } catch (error) {
            sendFeedback.textContent = error.message;
        }
    });

    mediaInput.addEventListener('change', async () => {
        const file = mediaInput.files?.[0];
        if (!file) {
            pendingMediaData = null;
            pendingMediaMime = null;
            mediaStatus.textContent = 'No attachment selected.';
            return;
        }
        if (file.size > MAX_MEDIA_SIZE) {
            mediaInput.value = '';
            pendingMediaData = null;
            pendingMediaMime = null;
            mediaStatus.textContent = 'Attachment too large. Max 8MB.';
            return;
        }
        pendingMediaMime = file.type;
        pendingMediaData = await fileToDataUrl(file);
        mediaStatus.textContent = `Attached: ${file.name}`;
    });

    clearMediaButton.addEventListener('click', () => {
        mediaInput.value = '';
        pendingMediaData = null;
        pendingMediaMime = null;
        mediaStatus.textContent = 'No attachment selected.';
    });

    // Search user handler
    searchForm.addEventListener('submit', async event => {
        event.preventDefault();
        const prefix = searchInput.value.trim();
        if (!prefix) {
            searchStatus.textContent = 'Type a handle to search.';
            return;
        }
        searchStatus.textContent = 'Searching…';
        try {
            const result = await fetchJson(`${API.userSearch}?handle=${encodeURIComponent(prefix)}`);
            if (result.exists) {
                searchStatus.textContent = `✓ ${prefix} exists. Click to add.`;
                renderAddUserButton(prefix);
            } else {
                searchStatus.textContent = `✗ Invalid username. ${prefix} does not exist.`;
                searchList.innerHTML = '';
            }
        } catch (error) {
            searchStatus.textContent = 'Search failed.';
        }
    });

    function renderAddUserButton(userName) {
        searchList.innerHTML = '';
        const item = document.createElement('li');
        item.className = 'contact';
        const button = document.createElement('button');
        button.textContent = `Add ${userName}`;
        button.style.display = 'block';
        button.style.width = '100%';
        button.style.padding = '0.6rem';
        button.style.borderRadius = '12px';
        button.style.background = 'linear-gradient(135deg, #00ff94, #00a3ff)';
        button.style.border = 'none';
        button.style.color = '#04111d';
        button.style.fontWeight = '600';
        button.style.cursor = 'pointer';
        button.onclick = async () => {
            try {
                await fetchJson(API.contactsAdd, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ownerHandle: handle, contactHandle: userName})
                });
                selectContact(userName);
                searchStatus.textContent = 'Contact added.';
                searchList.innerHTML = '';
                await refreshContacts();
                await fetchRecent();
            } catch (error) {
                searchStatus.textContent = 'Failed to add contact.';
            }
        };
        item.appendChild(button);
        searchList.appendChild(item);
    }

    async function fetchRecent() {
        if (!selectedContact) {
            recentList.innerHTML = '';
            recentStatus.textContent = 'Select or add a contact to see conversation.';
            return [];
        }
        recentStatus.textContent = 'Updating…';
        const requestGeneration = conversationGeneration;
        try {
            const params = `?currentUser=${encodeURIComponent(handle)}&chatWith=${encodeURIComponent(selectedContact)}`;
            const data = await fetchJson(`${API.recent}${params}&limit=20`);
            if (requestGeneration !== conversationGeneration) {
                return data;
            }
            renderMessages(recentList, data);
            recentStatus.textContent = data.length ? `Showing ${data.length} messages.` : `No messages yet with ${selectedContact}.`;
            return data;
        } catch (error) {
            recentStatus.textContent = 'Could not load messages.';
            return [];
        }
    }

    async function refreshContacts() {
        try {
            const contacts = await fetchJson(`${API.contacts}?handle=${encodeURIComponent(handle)}`);
            contactList.innerHTML = '';
            if (contacts.length === 0) {
                const item = document.createElement('li');
                item.className = 'contact';
                item.textContent = 'No contacts yet. Search to add users!';
                contactList.appendChild(item);
            } else {
                contacts.forEach(contact => {
                    const item = document.createElement('li');
                    item.className = 'contact';
                    item.innerHTML = `<span class="contact-handle">${contact}</span>`;
                    item.style.cursor = 'pointer';
                    item.onclick = () => {
                        selectContact(contact);
                        fetchRecent();
                    };
                    contactList.appendChild(item);
                });
                if (!selectedContact) {
                    selectContact(contacts[0]);
                    fetchRecent();
                }
            }
        } catch (error) {
            console.error('Failed to load contacts:', error);
        }
    }

    function selectContact(contact) {
        conversationGeneration += 1;
        selectedContact = contact;
        chatStatus.textContent = `Now chatting with ${selectedContact}`;

        const startCallBtn = document.getElementById('startCallBtn');
        if (startCallBtn) {
            startCallBtn.style.display = 'flex';
        }

        const sidebar = document.querySelector('.sidebar');
        const sidebarBackdrop = document.getElementById('sidebarBackdrop');
        if (sidebar && sidebarBackdrop) {
            sidebar.classList.remove('open');
            sidebarBackdrop.classList.remove('open');
        }
    }

    async function refreshOwnPosts() {
        ownStatus.textContent = 'Loading your posts…';
        try {
            const data = await fetchJson(`${API.mine}?author=${encodeURIComponent(handle)}`);
            renderCompactList(ownList, data, 'No posts yet.');
            ownStatus.textContent = data.length ? `You have ${data.length} recent messages.` : 'No posts yet.';
        } catch (error) {
            ownStatus.textContent = 'Unable to load your posts.';
        }
    }

    async function sendMessage(text) {
        if (!selectedContact) {
            throw new Error('Select a contact first.');
        }
        conversationGeneration += 1;
        const data = await fetchJson(API.send, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                author: handle,
                password: password,
                to: selectedContact,
                text,
                mediaMime: pendingMediaMime,
                mediaData: pendingMediaData
            })
        });
        mediaInput.value = '';
        pendingMediaData = null;
        pendingMediaMime = null;
        mediaStatus.textContent = 'No attachment selected.';
        conversationGeneration += 1;
        return data;
    }

    async function deleteMessage(messageId) {
        if (!confirm('Delete this message for you?')) {
            return;
        }
        try {
            await fetchJson(API.delete, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({messageId, handle})
            });
            fetchRecent();
        } catch (error) {
            alert('Failed to delete message');
        }
    }

    function renderMessages(container, messages) {
        container.innerHTML = '';
        messages.slice().reverse().forEach(msg => {
            const article = document.createElement('article');
            article.className = 'message';
            if (msg.author === handle) {
                article.classList.add('message--mine');
            }
            const meta = document.createElement('div');
            meta.className = 'message-meta';
            meta.textContent = `${msg.author} • ${formatTimestamp(msg.timestamp)}`;
            const body = document.createElement('div');
            body.textContent = msg.text;

            if (msg.mediaData) {
                const mediaWrap = document.createElement('div');
                mediaWrap.className = 'message-media';
                if ((msg.mediaMime || '').startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = msg.mediaData;
                    img.alt = 'Shared image';
                    mediaWrap.appendChild(img);
                } else if ((msg.mediaMime || '').startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = msg.mediaData;
                    video.controls = true;
                    video.preload = 'metadata';
                    mediaWrap.appendChild(video);
                } else {
                    const link = document.createElement('a');
                    link.href = msg.mediaData;
                    link.textContent = 'Open attachment';
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    mediaWrap.appendChild(link);
                }
                article.appendChild(mediaWrap);
            }
            
            const footer = document.createElement('div');
            footer.style.display = 'flex';
            footer.style.justifyContent = 'space-between';
            footer.style.marginTop = '0.35rem';
            
            if (msg.author === handle) {
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '🗑 Delete';
                deleteBtn.style.fontSize = '0.7rem';
                deleteBtn.style.padding = '0.3rem 0.5rem';
                deleteBtn.style.background = 'rgba(255, 0, 0, 0.2)';
                deleteBtn.style.border = 'none';
                deleteBtn.style.borderRadius = '6px';
                deleteBtn.style.color = 'inherit';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.onclick = () => deleteMessage(msg.id);
                footer.appendChild(deleteBtn);
            }
            
            article.append(meta, body, footer);
            container.appendChild(article);
        });
        container.scrollTop = container.scrollHeight;
    }

    function renderCompactList(container, messages, emptyText) {
        container.innerHTML = '';
        if (!messages.length) {
            const placeholder = document.createElement('li');
            placeholder.className = 'contact';
            placeholder.textContent = emptyText;
            container.appendChild(placeholder);
            return;
        }
        messages.slice(0, 6).forEach(msg => {
            const item = document.createElement('li');
            item.className = 'contact';
            item.innerHTML = `
                <span class="contact-handle">${msg.author}</span>
                <span class="contact-meta">${formatTimestamp(msg.timestamp)}</span>
                <small>${msg.text}</small>
            `;
            container.appendChild(item);
        });
    }

    async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || 'Request failed.');
        }
        return response.json();
    }

    function formatTimestamp(timestamp) {
        try {
            const dt = new Date(timestamp);
            return dt.toLocaleString([], {hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric'});
        } catch (error) {
            return timestamp;
        }
    }

    function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(String(reader.result));
            reader.onerror = () => reject(new Error('Unable to read file.'));
            reader.readAsDataURL(file);
        });
    }

    async function refreshChatView() {
        if (conversationRefreshInFlight) {
            return;
        }
        conversationRefreshInFlight = true;
        try {
            if (selectedContact) {
                await fetchRecent();
            }
            await refreshOwnPosts();
        } finally {
            conversationRefreshInFlight = false;
        }
    }

    // Sidebar logic
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.querySelector('.sidebar');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');

    function toggleSidebar() {
        sidebar.classList.toggle('open');
        sidebarBackdrop.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleSidebar);
    sidebarBackdrop.addEventListener('click', toggleSidebar);

    // Call logic
    const startCallBtn = document.getElementById('startCallBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    const callOverlay = document.getElementById('callOverlay');
    const jitsiContainer = document.getElementById('jitsiContainer');
    let jitsiApi = null;

    startCallBtn.addEventListener('click', () => {
        if (!selectedContact) return;
        callOverlay.classList.add('active');

        // Generate a deterministic room name based on the two users
        const roomUsers = [handle, selectedContact].sort();
        const roomName = 'ShipLink_' + roomUsers.join('_');

        const domain = 'meet.jit.si';
        const options = {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: jitsiContainer,
            userInfo: {
                displayName: handle
            },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                disableDeepLinking: true,
                prejoinPageEnabled: false
            },
            interfaceConfigOverwrite: {
                DISABLE_DOMINANT_SPEAKER_INDICATOR: true,
                MOBILE_APP_PROMO: false
            }
        };
        jitsiApi = new JitsiMeetExternalAPI(domain, options);
    });

    endCallBtn.addEventListener('click', () => {
        if (jitsiApi) {
            jitsiApi.dispose();
            jitsiApi = null;
        }
        callOverlay.classList.remove('active');
    });

    // Load initial data
    refreshContacts();
    refreshChatView();

    setInterval(() => {
        refreshChatView();
    }, 1000);

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            refreshChatView();
        }
    });
</script>
</body>
</html>
